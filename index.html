<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<meta name="theme-color" content="#0a0f1e"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="DAPENDIG"/>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icon-192.png"/>
<title>DAPENDIG</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0f1e;color:#e2e8f0;font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px}
.card{background:#111827;border-radius:20px;padding:24px;width:100%;max-width:380px;border:1px solid #1f2937}
input{width:100%;background:#0a0f1e;border:1.5px solid #1f2937;border-radius:10px;padding:11px 13px;color:#e2e8f0;font-size:14px;outline:none;margin-bottom:10px;font-family:inherit}
input:focus{border-color:#0ea5e9}
button{font-family:inherit;cursor:pointer;width:100%;border:none;border-radius:10px;padding:13px;font-size:14px;font-weight:700;margin-bottom:8px}
.bp{background:linear-gradient(90deg,#0284c7,#0ea5e9);color:#fff}
label{font-size:11px;color:#64748b;font-weight:700;display:block;margin-bottom:5px;letter-spacing:.8px;text-transform:uppercase}
.err{background:#450a0a;color:#fca5a5;border-radius:8px;padding:9px 13px;font-size:13px;margin-bottom:10px;display:none;line-height:1.5}
</style>
</head>
<body>
<div class="card">
  <div style="text-align:center;margin-bottom:20px">
    <div style="font-size:44px">🏛️</div>
    <div style="font-size:20px;font-weight:900;color:#0ea5e9;margin-top:6px">DAPENDIG</div>
    <div style="font-size:11px;color:#64748b">Data Kependudukan Digital</div>
  </div>

  <!-- Install Banner -->
  <div id="_installBanner" style="display:none;background:linear-gradient(90deg,#0284c7,#0ea5e9);border-radius:12px;padding:12px 14px;margin-bottom:14px;align-items:center;justify-content:space-between">
    <div>
      <div style="font-weight:800;font-size:13px">📲 Pasang ke Beranda</div>
      <div style="font-size:11px;opacity:.85">Buka seperti aplikasi HP</div>
    </div>
    <button id="_installBtn" style="background:#fff;color:#0284c7;border:none;border-radius:8px;padding:7px 14px;font-weight:800;font-size:12px;cursor:pointer;width:auto;margin:0">Pasang</button>
  </div>

  <!-- Banner sesi tersimpan -->
  <div id="_sessionBanner" style="display:none;background:#0c1a2e;border:1px solid #1e3a5f;border-radius:12px;padding:14px;margin-bottom:14px">
    <div style="font-size:12px;color:#7dd3fc;font-weight:700;margin-bottom:4px">🔐 Sesi Tersimpan</div>
    <div style="font-size:13px;color:#cbd5e1;margin-bottom:12px;word-break:break-all" id="_sessionEmail">-</div>
    <div style="display:flex;gap:8px">
      <button id="_sessionContinue" style="flex:1;background:linear-gradient(90deg,#0284c7,#0ea5e9);color:#fff;border:none;border-radius:8px;padding:10px;font-size:13px;font-weight:700;cursor:pointer;margin:0">▶ Lanjutkan</button>
      <button id="_sessionLogout" style="flex:1;background:#1f2937;color:#94a3b8;border:1px solid #374151;border-radius:8px;padding:10px;font-size:13px;font-weight:700;cursor:pointer;margin:0">Ganti Akun</button>
    </div>
  </div>

  <!-- Form Login -->
  <div id="_loginForm">
    <label>Email</label>
    <input type="email" id="loginEmail" placeholder="petugas@desa.id" autocomplete="email"/>
    <label>Password</label>
    <input type="password" id="loginPass" placeholder="Password" autocomplete="current-password"/>
    <div class="err" id="loginErr"></div>
    <button class="bp" id="loginBtn">MASUK</button>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script>
firebase.initializeApp({
  apiKey:"AIzaSyBoQyPIVSp3iAqElO8H6utBSW90fcHqoNI",
  authDomain:"dapendig.firebaseapp.com",
  projectId:"dapendig",
  storageBucket:"dapendig.firebasestorage.app",
  messagingSenderId:"400697386418",
  appId:"1:400697386418:web:855f4984e4b4207ceeb0ab"
});

var intentionalLogin = false;

// Cek sesi — tampilkan banner pilihan, TIDAK langsung redirect
firebase.auth().onAuthStateChanged(function(user){
  if(user && !intentionalLogin){
    document.getElementById('_sessionBanner').style.display = 'block';
    document.getElementById('_sessionEmail').textContent = user.email;
    document.getElementById('_loginForm').style.display = 'none';
  }
});

// Lanjutkan sesi
document.getElementById('_sessionContinue').addEventListener('click', function(){
  intentionalLogin = true;
  window.location.href = 'app.html';
});

// Ganti akun — logout, tampilkan form
document.getElementById('_sessionLogout').addEventListener('click', function(){
  firebase.auth().signOut().then(function(){
    document.getElementById('_sessionBanner').style.display = 'none';
    document.getElementById('_loginForm').style.display = 'block';
    document.getElementById('loginEmail').value = '';
    document.getElementById('loginPass').value = '';
    document.getElementById('loginEmail').focus();
  });
});

function showErr(msg){var e=document.getElementById('loginErr');e.innerHTML=msg;e.style.display='block';}
function hideErr(){document.getElementById('loginErr').style.display='none';}

document.getElementById('loginBtn').addEventListener('click', function(){
  var email=document.getElementById('loginEmail').value.trim();
  var pass=document.getElementById('loginPass').value;
  hideErr();
  if(!email||!pass){showErr('⚠️ Email dan password wajib!');return;}
  var btn=this;
  btn.textContent='⏳ Memuat...';btn.disabled=true;
  firebase.auth().signInWithEmailAndPassword(email, pass)
    .then(function(){
      intentionalLogin=true;
      window.location.href='app.html';
    })
    .catch(function(e){
      var msg=e.message;
      if(e.code==='auth/user-not-found'||e.code==='auth/wrong-password'||e.code==='auth/invalid-credential')msg='Email atau password salah.';
      else if(e.code==='auth/too-many-requests')msg='Terlalu banyak percobaan, coba lagi nanti.';
      else if(e.code==='auth/invalid-email')msg='Format email tidak valid.';
      showErr('❌ '+msg);
      btn.textContent='MASUK';btn.disabled=false;
    });
});

document.getElementById('loginPass').addEventListener('keydown',function(e){
  if(e.key==='Enter') document.getElementById('loginBtn').click();
});

// PWA Install
var deferredPrompt=null;
window.addEventListener('beforeinstallprompt',function(e){
  e.preventDefault();deferredPrompt=e;
  document.getElementById('_installBanner').style.display='flex';
});
document.getElementById('_installBtn').addEventListener('click',function(){
  if(!deferredPrompt)return;
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then(function(){
    deferredPrompt=null;
    document.getElementById('_installBanner').style.display='none';
  });
});
window.addEventListener('appinstalled',function(){
  deferredPrompt=null;
  document.getElementById('_installBanner').style.display='none';
});
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').catch(function(){});
}
</script>
</body>
</html>
